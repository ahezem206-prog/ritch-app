<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Ritch - Short Videos</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',Tahoma,sans-serif;background:#000;color:#fff;overflow:hidden;height:100vh}.app{height:100vh;position:relative}.login-screen{background:#000;height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.login-box{background:#1a1a1a;padding:30px;border-radius:15px;width:100%;max-width:350px;text-align:center;border:1px solid #333}.login-box h1{color:#FE2C55;font-size:32px;margin-bottom:10px;font-weight:700}.login-box h1 i{color:#FFD700}.login-box p{color:#999;margin-bottom:25px;font-size:14px}.login-box input{width:100%;padding:15px;margin:8px 0;background:#000;border:2px solid #FE2C55;border-radius:8px;color:#fff;font-size:16px}.login-box input:focus{outline:0;border-color:#FFD700}.login-box button{width:100%;padding:15px;background:linear-gradient(90deg,#FE2C55 0%,#FF3B6C 100%);border:none;border-radius:8px;color:#fff;font-weight:700;cursor:pointer;margin-top:15px;font-size:16px}.main-app{display:none;height:100vh}.video-feed{height:100vh;overflow-y:scroll;scroll-snap-type:y mandatory}.video-item{height:100vh;position:relative;scroll-snap-align:start;background:#000}.video-item video{width:100%;height:100%;object-fit:cover}.video-overlay{position:absolute;bottom:80px;left:0;right:0;padding:20px;background:linear-gradient(transparent,rgba(0,0,0,.8))}.user-info{display:flex;align-items:center;margin-bottom:10px}.username{font-weight:700;font-size:16px}.follow-btn{background:#FE2C55;border:none;padding:5px 15px;border-radius:5px;color:#fff;font-size:14px;margin-left:10px}.video-desc{font-size:14px;margin:10px 0}.video-music{font-size:13px;color:#ddd}.side-buttons{position:absolute;right:10px;bottom:120px;display:flex;flex-direction:column;align-items:center;gap:20px}.side-btn{display:flex;flex-direction:column;align-items:center;color:#fff;font-size:12px}.side-btn i{font-size:28px;margin-bottom:5px;width:45px;height:45px;background:rgba(255,255,255,.1);border-radius:50%;display:flex;align-items:center;justify-content:center}.side-btn.liked i{color:#FE2C55}.avatar-btn{width:50px;height:50px;border-radius:50%;border:2px solid #FE2C55;position:relative}.plus-icon{position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);background:#FE2C55;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px}.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#000;border-top:1px solid #222;display:flex;justify-content:space-around;padding:8px 0;z-index:100}.nav-item{display:flex;flex-direction:column;align-items:center;color:#888;font-size:10px;padding:5px 15px}.nav-item.active{color:#fff}.nav-item i{font-size:22px;margin-bottom:3px}.add-btn{background:linear-gradient(90deg,#FE2C55 0%,#FF3B6C 100%);width:45px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-top:-15px}.add-btn i{color:#fff;font-size:20px;margin:0}.top-bar{position:fixed;top:0;left:0;right:0;padding:15px;z-index:100;display:flex;justify-content:center;gap:30px;background:linear-gradient(rgba(0,0,0,.6),transparent)}.top-tab{color:#888;font-weight:700;font-size:16px;padding-bottom:5px}.top-tab.active{color:#fff;border-bottom:2px solid #fff}</style></head><body><div id="app" class="app"></div><script>const USERS={"admin@ritch.com":"123456","user":"1234"};const VIDEOS=[{id:1,user:"@abood_ritch",avatar:"https://i.pravatar.cc/100?img=1",desc:"Best moment today 🔥 #Ritch #Trending",music:"Sound - Original Audio",video:"https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4",likes:15200,comments:342,shares:89,liked:false},{id:2,user:"@sara_vip",avatar:"https://i.pravatar.cc/100?img=5",desc:"New dance challenge 💃 Join us!",music:"Song - Popular Remix",video:"https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4",likes:89300,comments:1200,shares:450,liked:false},{id:3,user:"@crypto_king",avatar:"https://i.pravatar.cc/100?img=3",desc:"Bitcoin explained in 15 seconds ₿",music:"Music - Trading Beats",video:"https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4",likes:45100,comments:890,shares:320,liked:false}];let currentUser=null;function showLogin(){document.getElementById("app").innerHTML='<div class="login-screen"><div class="login-box"><h1>Ritch <i class="fas fa-bolt"></i></h1><p>Share your moments with the world</p><input type="text" id="email" placeholder="Email"><input type="password" id="password" placeholder="Password"><button onclick="login()">Login / Sign Up</button></div></div>'}function login(){const e=document.getElementById("email").value,t=document.getElementById("password").value;e&&t?(localStorage.setItem("ritch_user",e),currentUser=e,showApp()):alert("Please enter email and password")}function logout(){localStorage.removeItem("ritch_user"),currentUser=null,showLogin()}function showApp(){document.getElementById("app").innerHTML=`<div class="main-app"><div class="top-bar"><div class="top-tab">Following</div><div class="top-tab active">For You</div></div><div class="video-feed" id="videoFeed">${VIDEOS.map((e,t)=>`<div class="video-item"><video src="${e.video}" loop playsinline></video><div class="side-buttons"><div class="side-btn"><div class="avatar-btn" style="background-image: url(${e.avatar}); background-size: cover;"><div class="plus-icon"><i class="fas fa-plus"></i></div></div></div><div class="side-btn ${e.liked?"liked":""}" onclick="toggleLike(${t})"><i class="fas fa-heart"></i><span>${formatNum(e.likes)}</span></div><div class="side-btn" onclick="openComments(${t})"><i class="fas fa-comment-dots"></i><span>${formatNum(e.comments)}</span></div><div class="side-btn" onclick="shareVideo(${t})"><i class="fas fa-share"></i><span>${formatNum(e.shares)}</span></div><div class="side-btn"><i class="fas fa-music"></i></div></div><div class="video-overlay"><div class="user-info"><div><div class="username">${e.user}</div><div class="video-desc">${e.desc}</div><div class="video-music"><i class="fas fa-music"></i> ${e.music}</div></div><button class="follow-btn">Follow</button></div></div></div>`).join("")}</div><div class="bottom-nav"><div class="nav-item active"><i class="fas fa-home"></i><span>Home</span></div><div class="nav-item"><i class="fas fa-compass"></i><span>Discover</span></div><div class="nav-item"><div class="add-btn"><i class="fas fa-plus"></i></div></div><div class="nav-item"><i class="fas fa-inbox"></i><span>Inbox</span></div><div class="nav-item" onclick="logout()"><i class="fas fa-user"></i><span>Me</span></div></div></div>`;setTimeout(()=>{const e=document.querySelectorAll("video"),t=new IntersectionObserver(e=>{e.forEach(e=>{e.isIntersecting?e.target.play():e.target.pause()})},{threshold:.7});e.forEach(e=>t.observe(e))},100)}function toggleLike(e){VIDEOS[e].liked=!VIDEOS[e].liked,VIDEOS[e].likes+=VIDEOS[e].liked?1:-1,showApp()}function openComments(e){alert("Comments: Coming Soon")}function shareVideo(e){VIDEOS[e].shares++,showApp(),alert("Link copied!")}function formatNum(e){return e>=1e6?(e/1e6).toFixed(1)+"M":e>=1e3?(e/1e3).toFixed(1)+"K":e}localStorage.getItem("ritch_user")?(currentUser=localStorage.getItem("ritch_user"),showApp()):showLogin();</script></body></html>
